<!DOCTYPE html>
<html>
<head>
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(245, 230, 211, 0.25);
            z-index: -1;
        }

        .login-box {
            background: #fff3e0;
            padding: 35px;
            border-radius: 25px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 2;
            position: relative;
        }

        .logo img {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid #5a3e2b;
        }

        h2 {
            font-family: 'Pacifico', cursive;
            color: #5a3e2b;
        }

        .label-bubble {
            background: #d6bfa9;
            padding: 6px 12px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #5a3e2b;
        }

        .form-control {
            border-radius: 15px;
            text-align: center;
            margin-bottom: 10px;
            border: 1px solid #5a3e2b;
        }

        .btn-custom { border-radius: 15px; }
        .btn-warning { background-color: #6b3e26; border: none; }
        .btn-warning:hover { background-color: #59321d; }
        .btn-cancel { background-color: #8b5e3c; border: none; color: #fff; }
        .btn-cancel:hover { background-color: #70472b; }

        #message { margin-top: 10px; font-size: 14px; color: #5a3e2b; }

        a { font-family: 'Pacifico', cursive; color: #5a3e2b; text-decoration: none; }
        a:hover { text-decoration: underline; }

        footer {
            position: fixed; bottom: 0; width: 100%;
            background: #5a3e2b; text-align: center; padding: 12px; font-size: 14px; color: #fff; z-index: 2;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="login-box">
        <div class="logo">
            <img src="https://png.pngtree.com/template/20191203/ourmid/pngtree-coffee-logo-design-vector-image_337940.jpg" alt="Cafe Logo">
        </div>
        <h2>Login</h2>
        <p style="font-size:13px;">Please enter your credentials</p>

        <div class="label-bubble">Username</div>
        <input type="text" id="username" class="form-control" placeholder="Enter username">

        <div class="label-bubble">Password</div>
        <input type="password" id="password" class="form-control" placeholder="Enter password">

        <div class="form-check text-start">
            <input class="form-check-input" type="checkbox" id="checkboxID" onclick="function_name_here()">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <p id="message"></p>

        <button class="btn btn-warning btn-custom mt-2" onclick="login()">Login</button>
        <button class="btn btn-cancel btn-custom mt-2" onclick="clearFields()">Cancel</button>

        <p class="mt-3">
            <a href="forgot.html">Forgot username / password?</a>
        </p>

        <button class="btn btn-secondary btn-sm" onclick="toggleInfo()">Show Instructions</button>
        <p id="info" style="display:none; font-size:12px;">
            Username: Rodolfo | Password: Lao
        </p>
    </div>

    <footer>Rodolfo Lao III 9-Ruby</footer>

    <script>
    function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;
        if (user === "Rodolfo" && pass === "Lao") {
            window.alert(`Welcome to the website, ${user}!`);
        } else if (user === "" || pass === "") {
            window.alert("Please fill in all fields");
        } else {
            window.alert("Access denied");
        }
    }

    function clearFields() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("message").innerHTML = "";
    }

    function toggleInfo() {
        let info = document.getElementById("info");
        if (info.style.display === "none") {
            info.style.display = "block";
        } else {
            info.style.display = "none";
        }
    }

    function function_name_here() {
        let variable_name = document.getElementById("checkboxID").checked;
        switch(variable_name) {
            case true:
                document.getElementById("message").innerHTML = "You will stay logged in";
            break;
            case false:
                document.getElementById("message").innerHTML = "";
            break;
        }
    }
    </script>
</body>
</html>
