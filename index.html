<!DOCTYPE html>
<html>
<head>
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5e6d3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .login-box {
            background: #fff8f0;
            padding: 35px;
            border-radius: 25px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .label-bubble {
            background: #ead7c3;
            padding: 6px 12px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .form-control {
            border-radius: 15px;
            text-align: center;
            margin-bottom: 10px;
        }

        .btn-custom {
            border-radius: 15px;
        }

        .btn-cancel {
            background-color: #ffe8a3;
            border: none;
        }

        .btn-cancel:hover {
            background-color: #ffdd80;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #d6bfa9;
            text-align: center;
            padding: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <div class="logo">💻</div>
    <h2>Login</h2>
    <p style="font-size:13px;">Please enter your credentials</p>

    <div class="label-bubble">Username</div>
    <input type="text" id="username" class="form-control" placeholder="Enter username">

    <div class="label-bubble">Password</div>
    <input type="password" id="password" class="form-control" placeholder="Enter password">

    <div class="form-check text-start">
        <input class="form-check-input" type="checkbox" id="checkboxID" onclick="checkStayLoggedIn()">
        <label class="form-check-label">Stay logged in</label>
    </div>

    <p id="message"></p>

    <button class="btn btn-warning btn-custom mt-2" onclick="login()">Login</button>
    <button class="btn btn-cancel btn-custom mt-2" onclick="clearFields()">Cancel</button>

    <p class="mt-3">
        <a href="forgot.html">Forgot username / password?</a>
    </p>

    <button class="btn btn-secondary btn-sm" onclick="toggleInfo()">Show Instructions</button>
    <p id="info" style="display:none; font-size:12px;">
        Username: Rodolfo | Password: Lao
    </p>
</div>

<footer>
    Rodolfo Lao III 9-Ruby
</footer>

<script>
// Use if-else statement for username and password verification. Use === comparison operator and AND operator to check if condition is TRUE.
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user === "Rodolfo" && pass === "Lao") {
        window.alert("Access granted");
    } else if (user === "" || pass === "") {
        window.alert("Please fill in all fields");
    } else {
        window.alert("Access denied");
    }
}

function clearFields() {
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    document.getElementById("message").innerHTML = "";
}

function toggleInfo() {
    let info = document.getElementById("info");

    if (info.style.display === "none") {
        info.style.display = "block";
    } else {
        info.style.display = "none";
    }
}

// Use Switch Code for the checkbox
function checkStayLoggedIn() {
    let variable_name = document.getElementById("checkboxID").checked; 
    // when checked, it reads true

    switch(variable_name) {
        case true:
            // use innerHTML to display a message
            document.getElementById("message").innerHTML = "You will stay logged in";
            break;

        case false:
            // use innerHTML to show nothing. use quotation;
            document.getElementById("message").innerHTML = "";
            break;

        // default may almost never needed since there is already true and false statement;
    }
}
</script>

</body>
</html>
